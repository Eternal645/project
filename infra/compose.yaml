services:
  tests:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m unittest discover -s tests -p test_*.py -t .

  gui-smoke:
    profiles:
      - gui
    build:
      context: ..
      dockerfile: Dockerfile
    command: >
      sh -c "timeout 20s xvfb-run -a --server-args='-screen 0 1024x768x24'
      python -m unittest discover -s tests/smoke -p test_*.py -t . -v"
