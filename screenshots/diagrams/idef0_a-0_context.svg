<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f6f2"/>
  <rect x="4" y="4" width="812" height="512" rx="4" fill="none" stroke="#bbb" stroke-width="1"/>

  <text x="14" y="22" font-size="11" fill="#555">Цель: автоматизация торговой деятельности мебельного магазина</text>
  <text x="14" y="38" font-size="11" fill="#555">Точка зрения: директор магазина   |   Тип модели: TO-BE</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 2L9 5L1 8" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
    <marker id="arr_up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 9L5 1L8 9" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Центральный блок -->
  <rect x="280" y="170" width="260" height="140" rx="5" fill="#eef2fa" stroke="#3a3a5c" stroke-width="2"/>
  <text x="410" y="228" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Управление</text>
  <text x="410" y="248" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">мебельным магазином</text>
  <text x="410" y="296" text-anchor="middle" font-size="12" fill="#888">A-0</text>

  <!-- Входы слева -->
  <line x1="40" y1="210" x2="280" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Клиенты</text>

  <line x1="40" y1="245" x2="280" y2="245" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="235" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Товары</text>

  <line x1="40" y1="280" x2="280" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="295" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Поставщики</text>

  <!-- Выходы справа -->
  <line x1="540" y1="210" x2="776" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="658" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Выполненные заказы</text>

  <line x1="540" y1="245" x2="776" y2="245" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="658" y="260" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Доставки</text>

  <line x1="540" y1="280" x2="776" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="658" y="295" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Отчёты и аналитика</text>

  <!-- Управление сверху -->
  <line x1="340" y1="90" x2="340" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="270" y="116" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Ценовая политика</text>

  <line x1="480" y1="90" x2="480" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="558" y="116" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Законодательство</text>

  <!-- Механизмы снизу (стрелки вверх, входят снизу) -->
  <line x1="360" y1="420" x2="360" y2="310" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="448" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Сотрудники</text>

  <line x1="460" y1="420" x2="460" y2="310" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="448" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Информационная система</text>

  <!-- Подпись внизу -->
  <text x="14" y="500" font-size="9" fill="#aaa">NODE: A-0    TITLE: Управление мебельным магазином    AUTHOR: Мебельный магазин</text>
</svg>
